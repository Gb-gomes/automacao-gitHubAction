name: CI Pipeline

on:
  push:
    branches: ["master", "main"]

jobs:

  validar_codigo:
    runs-on: ubuntu-latest

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Validar código
        run: |
          echo "Validando o código..."
          echo "Nenhum erro encontrado!"

  build_projeto:
    runs-on: ubuntu-latest
    needs: validar_codigo

    steps:
      - name: Clonar repositório
        uses: actions/checkout@v4

      - name: Simular build
        run: |
          echo "Iniciando build do projeto..."
          echo "Build realizado com sucesso!"

      - name: Mostrar segredo
        run: |
          echo "Mensagem secreta:"
          echo "${{ secrets.MENSAGEM_SECRETA }}"